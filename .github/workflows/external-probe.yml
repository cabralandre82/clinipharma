name: External Probe

# ────────────────────────────────────────────────────────────────────────────
# Layer 2 of synthetic monitoring — see docs/observability/synthetic-monitoring.md
#
# Hits the production URL from outside the Vercel platform every 5 minutes,
# proving that:
#   - DNS resolves
#   - TLS handshake completes
#   - Vercel edge serves the lambda
#   - The lambda boots and the app responds with the expected shape
#
# This is the failure class the in-cluster probe (Layer 1) physically cannot
# detect: when the Vercel project is wholly unreachable, no in-cluster cron
# can call out to report it.
#
# Cost: this repo is public, so GitHub Actions minutes are unlimited.
# Cadence is 5 min (the same as Layer 1). Each run takes ~30s.
# ────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: Override base URL (e.g. https://staging.clinipharma.com.br)
        required: false
        default: ''

permissions:
  contents: read
  issues: write

concurrency:
  # Two probes overlapping is wasteful but harmless. Cancel any in-flight
  # run when a new one starts so a slow probe doesn't queue up behind a
  # 5-min cron tick.
  group: external-probe
  cancel-in-progress: true

jobs:
  probe:
    name: HTTP probe (4 endpoints)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      ok: ${{ steps.probe.outputs.ok }}
      failures: ${{ steps.probe.outputs.failures }}
      summary: ${{ steps.probe.outputs.summary }}
    steps:
      - name: Probe
        id: probe
        env:
          BASE_URL: ${{ inputs.target_url != '' && inputs.target_url || 'https://clinipharma.com.br' }}
        run: |
          set -uo pipefail

          # Each row: <name>|<path>|<expected_status>|<must_contain_in_body>
          # `*` in must_contain means body shape isn't checked.
          TARGETS=$(cat <<'ROWS'
          live|/api/health/live|200|"check":"live"
          ready|/api/health/ready|200|"check":"ready"
          login|/login|200|Clinipharma
          registro|/registro|200|cadastro
          ROWS
          )

          mkdir -p artifacts
          : > artifacts/probe.jsonl
          : > artifacts/probe.txt
          fail_count=0
          fail_summary=""

          while IFS='|' read -r name path want_status want_body; do
            url="${BASE_URL}${path}"
            # %{http_code}|%{time_total}|%{size_download}
            stats=$(curl -sS -L -o /tmp/body \
              --max-time 15 \
              --retry 1 --retry-delay 2 \
              -H 'user-agent: clinipharma-external-probe/1.0 (+https://github.com/cabralandre82/clinipharma)' \
              -w '%{http_code}|%{time_total}|%{size_download}|%{num_redirects}' \
              "$url" 2>/dev/null) || stats="000|0|0|0"

            code=${stats%%|*}
            rest=${stats#*|}
            t_total=${rest%%|*}
            rest=${rest#*|}
            size=${rest%%|*}
            redirects=${rest##*|}

            ok=true
            reason=""
            if [ "$code" != "$want_status" ]; then
              ok=false
              reason="status=${code} want=${want_status}"
            elif ! grep -qF "$want_body" /tmp/body 2>/dev/null; then
              ok=false
              # Avoid leaking the whole body into logs/issues — first 80 chars only
              snippet=$(head -c 80 /tmp/body | tr -d '\n' | sed 's/[[:space:]]\{2,\}/ /g')
              reason="body missing '${want_body}' (got: ${snippet}...)"
            fi

            ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            ms=$(awk -v t="$t_total" 'BEGIN{printf "%d", t*1000}')

            jq -nc \
              --arg ts "$ts" \
              --arg name "$name" \
              --arg url "$url" \
              --arg code "$code" \
              --arg ms "$ms" \
              --arg size "$size" \
              --arg redirects "$redirects" \
              --arg ok "$ok" \
              --arg reason "$reason" \
              '{ts:$ts,name:$name,url:$url,code:($code|tonumber),latency_ms:($ms|tonumber),size_bytes:($size|tonumber),redirects:($redirects|tonumber),ok:($ok=="true"),reason:$reason}' \
              >> artifacts/probe.jsonl

            line=$(printf '  %-9s %-40s %3s  %5sms  %s' "$name" "$path" "$code" "$ms" "$([ "$ok" = "true" ] && echo OK || echo "FAIL ($reason)")")
            echo "$line" | tee -a artifacts/probe.txt

            if [ "$ok" != "true" ]; then
              fail_count=$((fail_count + 1))
              fail_summary="${fail_summary}- **${name}** \`${path}\` → ${reason}"$'\n'
            fi
          done <<< "$TARGETS"

          echo
          echo "──────────────────────────────────────────────────────────"
          if [ $fail_count -eq 0 ]; then
            echo "✓ all targets healthy"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ ${fail_count} target(s) failed"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "failures=${fail_count}" >> "$GITHUB_OUTPUT"
          {
            echo 'summary<<EOF_SUMMARY'
            echo "${fail_summary:-(all healthy)}"
            echo 'EOF_SUMMARY'
          } >> "$GITHUB_OUTPUT"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: probe-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          retention-days: 7

      - name: Fail the run when any probe failed
        if: steps.probe.outputs.ok != 'true'
        run: |
          echo "::error::external probe detected ${{ steps.probe.outputs.failures }} failed target(s)"
          exit 1

  alert:
    name: Open / refresh tracking issue on failure
    runs-on: ubuntu-latest
    needs: probe
    if: ${{ failure() && needs.probe.outputs.ok != 'true' }}
    timeout-minutes: 2
    steps:
      - name: Open or update probe-failure issue
        uses: actions/github-script@v9
        env:
          FAILURES: ${{ needs.probe.outputs.failures }}
          SUMMARY: ${{ needs.probe.outputs.summary }}
        with:
          script: |
            const failures = process.env.FAILURES || '?';
            const summary  = process.env.SUMMARY  || '(no detail)';
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title    = '🔴 External probe failing';
            const label    = 'probe-failure';

            // Ensure the label exists (idempotent).
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  label,
                color: 'b60205',
                description: 'Auto-managed by .github/workflows/external-probe.yml',
              });
            } catch (e) { /* already exists */ }

            // Find the existing open issue, if any.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            const body = [
              `External probe detected **${failures}** failed target(s) at ${new Date().toISOString()}.`,
              '',
              '### Failures',
              summary,
              '',
              `### Latest run`,
              `- ${runUrl}`,
              '',
              `### Triage`,
              `1. Check the run artifact (\`probe-<id>\`) for the full JSONL.`,
              `2. Cross-reference with [\`/status\`](https://clinipharma.com.br/status) and the in-cluster probe (\`cron_runs\` table).`,
              `3. If only \`ready\` is failing, the DB is the suspect — see \`docs/runbooks/health-check-failing.md\`.`,
              `4. If everything is failing, suspect Vercel-wide outage — see [Vercel status](https://www.vercel-status.com/).`,
              `5. The auto-close happens once two consecutive runs are green.`,
            ].join('\n');

            if (open.data.length > 0) {
              const issue = open.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: `Probe still failing.\n\n${body}`,
              });
              core.notice(`Updated existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.notice(`Opened issue #${created.data.number}`);
            }

  recover:
    name: Auto-close on sustained recovery
    runs-on: ubuntu-latest
    needs: probe
    if: ${{ success() && needs.probe.outputs.ok == 'true' }}
    timeout-minutes: 2
    steps:
      - name: Close the open probe-failure issue if green twice in a row
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'probe-failure';
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });
            if (open.data.length === 0) {
              core.info('no open probe-failure issue to close');
              return;
            }
            const issue = open.data[0];

            // Look at the last two External Probe runs on main. If BOTH succeeded,
            // close. If only the current succeeded, comment "1 green run, watching".
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'external-probe.yml',
              branch:  'main',
              per_page: 5,
            });
            // Slice off the currently-running entry (status != completed yet) plus
            // the one we just executed.
            const completed = runs.data.workflow_runs
              .filter(r => r.id !== context.runId && r.status === 'completed')
              .slice(0, 1);

            if (completed.length === 1 && completed[0].conclusion === 'success') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: `Two consecutive green probe runs — auto-closing.\nLatest run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.notice(`Closed issue #${issue.number}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: `1 green run, waiting for a second consecutive green before auto-closing.`,
              });
              core.info(`Issue #${issue.number} kept open pending second green run`);
            }
