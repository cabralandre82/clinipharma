name: Offsite Backup

# Weekly offsite backup of the Supabase production database plus critical
# Storage buckets. Cipher the artefacts with `age` using a recipient key held
# by the founder offline — only that key can decrypt.
#
# Target: Cloudflare R2 (S3-compatible, zero egress fees).
# Retention: last 12 weeklies + last 6 monthlies (enforced by lifecycle rule
# on the R2 bucket — see docs/disaster-recovery.md).
#
# Triggers:
#   - Sundays 04:00 BRT (07:00 UTC)
#   - Manual dispatch when we need a pre-change snapshot

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      label:
        description: 'Custom label for this backup (optional)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: offsite-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Snapshot, encrypt, upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: America/Sao_Paulo
      # Required secrets (configured on the repository):
      #   SUPABASE_DB_URL              postgres URL with credentials for pg_dump
      #   AGE_PUBLIC_KEY               age recipient (starts with `age1...`)
      #   R2_ACCOUNT_ID                Cloudflare R2 account id
      #   R2_ACCESS_KEY_ID             R2 S3-compatible access key
      #   R2_SECRET_ACCESS_KEY         R2 S3-compatible secret
      #   R2_BUCKET                    bucket name (e.g. clinipharma-offsite)
      #   SUPABASE_PROJECT_REF         project ref (e.g. jomdntqlgrupvhrqoyai)
      #   SUPABASE_SERVICE_ROLE_KEY    service_role JWT for Storage REST API
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client 17 and age
        # Supabase is on PostgreSQL 17 as of 2026-04. Client major must be >=
        # server major or pg_dump refuses with a version-mismatch error.
        # awscli is pre-installed on ubuntu-latest (v2).
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17 age
          aws --version

      - name: Compute snapshot metadata
        id: meta
        run: |
          STAMP="$(date -u +'%Y%m%dT%H%M%SZ')"
          LABEL="${{ github.event.inputs.label }}"
          [ -z "$LABEL" ] && LABEL="weekly"
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "archive_dir=$RUNNER_TEMP/backup-$STAMP" >> "$GITHUB_OUTPUT"
          mkdir -p "$RUNNER_TEMP/backup-$STAMP"

      - name: Database snapshot (pg_dump custom format)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          OUT="${{ steps.meta.outputs.archive_dir }}/db-${{ steps.meta.outputs.stamp }}.dump"

          # Sanity check: secret must be populated and look like a postgres URI.
          # Without this, pg_dump silently falls through to the local unix socket
          # and fails with an unhelpful error.
          if [ -z "${DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is empty"; exit 1
          fi
          case "$DB_URL" in
            postgresql://*|postgres://*) ;;
            *) echo "::error::SUPABASE_DB_URL does not start with postgresql://"; exit 1 ;;
          esac
          echo "DB URL host: $(echo "$DB_URL" | sed -E 's|^[^@]*@([^/?]*).*|\1|')"

          # Prefer the explicit v16 binary — the default /usr/bin/pg_dump on
          # ubuntu-latest may route through pg_wrapper to an older cluster.
          PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump
          [ -x "$PG_DUMP" ] || PG_DUMP=$(command -v pg_dump)
          "$PG_DUMP" --version

          "$PG_DUMP" \
            --format=custom \
            --compress=9 \
            --no-owner --no-privileges \
            --dbname="$DB_URL" \
            --file="$OUT"
          echo "Dumped $(stat --printf='%s bytes' "$OUT")"

      - name: Storage snapshot (contracts + prescriptions + order-documents)
        env:
          # Storage REST API requires a key with Storage read privileges.
          # The Supabase *personal access token* (sbp_…) is scoped to the
          # Management API only and is rejected by /storage/v1/*. We use the
          # service_role JWT instead (server-only, never shipped to client).
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          OUT_DIR="${{ steps.meta.outputs.archive_dir }}/storage"
          mkdir -p "$OUT_DIR"

          if [ -z "${PROJECT_REF:-}" ] || [ -z "${SERVICE_KEY:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF or SUPABASE_SERVICE_ROLE_KEY is empty"; exit 1
          fi
          BASE="https://$PROJECT_REF.supabase.co/storage/v1"

          # Sanity ping: list available buckets. Fails fast if the credential
          # is wrong or the project_ref has whitespace/typos.
          curl -fsS -H "Authorization: Bearer $SERVICE_KEY" -H "apikey: $SERVICE_KEY" \
            "$BASE/bucket" | jq '[.[] | .name] // []'

          # Minimal Storage export: list + download every object in the
          # buckets that matter. We do NOT capture public buckets (product
          # images) — those can be re-uploaded from source of truth.
          for BUCKET in contracts order-documents; do
            # Skip buckets that don't exist yet (e.g. brand-new environment).
            if ! curl -fsS -H "Authorization: Bearer $SERVICE_KEY" -H "apikey: $SERVICE_KEY" \
                   "$BASE/bucket/$BUCKET" >/dev/null 2>&1; then
              echo "Bucket $BUCKET not found — skipping"
              continue
            fi

            mkdir -p "$OUT_DIR/$BUCKET"
            echo "Listing $BUCKET…"
            # Supabase Storage list endpoint returns folders (id=null,
            # metadata=null) and files (both populated) mixed. Downloading
            # a folder path via /object/{bucket}/{prefix} returns 400, so we
            # recurse with a queue of prefixes and only download entries
            # that have a non-null id (= real objects).
            PREFIX_QUEUE=("")
            TOTAL_FILES=0
            while [ ${#PREFIX_QUEUE[@]} -gt 0 ]; do
              PREFIX="${PREFIX_QUEUE[0]}"
              PREFIX_QUEUE=("${PREFIX_QUEUE[@]:1}")
              PAGE=0
              while :; do
                BODY=$(jq -cn \
                  --arg prefix "$PREFIX" \
                  --argjson limit 1000 \
                  --argjson offset $((PAGE * 1000)) \
                  '{prefix: $prefix, limit: $limit, offset: $offset, sortBy: {column: "name", order: "asc"}}')
                RESP=$(curl -fsS \
                  -H "Authorization: Bearer $SERVICE_KEY" \
                  -H "apikey: $SERVICE_KEY" \
                  -H 'Content-Type: application/json' \
                  -d "$BODY" \
                  "$BASE/object/list/$BUCKET")
                COUNT=$(echo "$RESP" | jq 'length')
                echo "  prefix='$PREFIX' page=$PAGE count=$COUNT"
                [ "$COUNT" = "0" ] && break

                # Enqueue folders for recursion. A folder has id == null.
                while IFS= read -r FOLDER; do
                  [ -z "$FOLDER" ] && continue
                  NEXT_PREFIX="${PREFIX:+$PREFIX/}$FOLDER"
                  PREFIX_QUEUE+=("$NEXT_PREFIX")
                done < <(echo "$RESP" | jq -r '.[] | select(.id == null) | .name')

                # Download files (id != null).
                while IFS= read -r FILE; do
                  [ -z "$FILE" ] && continue
                  FULL_KEY="${PREFIX:+$PREFIX/}$FILE"
                  SAFE=$(echo "$FULL_KEY" | tr '/' '_')
                  # URL-encode spaces (+ is fine for ASCII keys we care about;
                  # full encoding would need a helper — UUID prefixes are safe).
                  ENCODED_KEY=$(echo "$FULL_KEY" | sed 's| |%20|g')
                  if curl -fsS \
                      -H "Authorization: Bearer $SERVICE_KEY" \
                      -H "apikey: $SERVICE_KEY" \
                      "$BASE/object/$BUCKET/$ENCODED_KEY" \
                      -o "$OUT_DIR/$BUCKET/$SAFE"; then
                    TOTAL_FILES=$((TOTAL_FILES + 1))
                  else
                    echo "::warning::failed to download $BUCKET/$FULL_KEY"
                  fi
                done < <(echo "$RESP" | jq -r '.[] | select(.id != null) | .name')

                PAGE=$((PAGE + 1))
                [ "$COUNT" -lt 1000 ] && break
              done
            done
            echo "  total files archived from $BUCKET: $TOTAL_FILES"
          done

          # Ensure at least one file lands in the storage archive so that
          # the tarball is always non-empty (and the age step has a target).
          echo "snapshot $(date -u +%FT%TZ)" > "$OUT_DIR/.manifest"

          tar -czf "${{ steps.meta.outputs.archive_dir }}/storage-${{ steps.meta.outputs.stamp }}.tgz" \
            -C "${{ steps.meta.outputs.archive_dir }}" storage
          rm -rf "$OUT_DIR"

      - name: Generate manifest and checksums
        run: |
          set -euo pipefail
          cd "${{ steps.meta.outputs.archive_dir }}"
          sha256sum * > manifest-sha256.txt
          cat manifest-sha256.txt
          cat > manifest.json <<EOF
          {
            "stamp": "${{ steps.meta.outputs.stamp }}",
            "label": "${{ steps.meta.outputs.label }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "files": $(ls -1 . | jq -R . | jq -s .)
          }
          EOF

      - name: Encrypt with age
        run: |
          set -euo pipefail
          cd "${{ steps.meta.outputs.archive_dir }}"
          echo "${{ secrets.AGE_PUBLIC_KEY }}" > recipient.age
          for f in *.dump *.tgz manifest.json manifest-sha256.txt; do
            [ -f "$f" ] || continue
            age -R recipient.age -o "$f.age" "$f"
            rm -f "$f"
          done
          ls -lh *.age

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          cd "${{ steps.meta.outputs.archive_dir }}"
          PREFIX="${{ steps.meta.outputs.label }}/${{ steps.meta.outputs.stamp }}"
          for f in *.age; do
            aws --endpoint-url="$R2_ENDPOINT" \
              s3 cp "$f" "s3://${{ secrets.R2_BUCKET }}/$PREFIX/$f" \
              --no-progress
          done
          echo "Uploaded $(ls *.age | wc -l) files to s3://${{ secrets.R2_BUCKET }}/$PREFIX/"

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_OPS }}
        run: |
          curl -fsS -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"✅ Offsite backup OK — label=${{ steps.meta.outputs.label }} stamp=${{ steps.meta.outputs.stamp }}\"}" \
            || true

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_OPS }}
        run: |
          curl -fsS -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"🔴 Offsite backup FAILED — run ${{ github.run_id }} — investigate immediately\"}" \
            || true
