name: Schema Drift Detection

# Verifies that the migrations under `supabase/migrations/` are
# self-consistent and that the production schema does not silently
# diverge from what's in the repo. Two layers:
#
#   1. Static parse  — every migration is loaded by psql `--dry-run`
#                      style validation (BEGIN; ... ROLLBACK) against
#                      a fresh ephemeral postgres so unparseable SQL
#                      or out-of-order references break the build.
#
#   2. Drift compare — when the SUPABASE_DB_URL secret is set, we
#                      `pg_dump --schema-only` the production schema
#                      and diff it against a clean reapply of all
#                      repo migrations. ANY DIFFERENCE fails the run.
#                      The diff is uploaded as an artifact for
#                      operators to inspect.
#
# Layer 2 is guarded by the secret so PRs from contributors without
# production credentials still run layer 1. Both layers are
# READ-ONLY against production.

on:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/schema-drift.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
  schedule:
    # Daily at 04:30 UTC catches drift introduced by an out-of-band
    # manual change (the kind we explicitly forbid but should still
    # detect quickly).
    - cron: '30 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ─── Layer 1: static parse against an ephemeral postgres ─────────────────
  parse:
    name: Parse migrations (ephemeral pg)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: drift_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U postgres && exit 0
            sleep 1
          done
          echo "::error::postgres never became ready"
          exit 1

      - name: Bootstrap Supabase-owned schemas + extensions
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGUSER: postgres
          PGDATABASE: drift_check
        run: |
          # Repo migrations expect a Supabase-shaped database. We do not
          # need the FULL Supabase platform — only the namespaces that
          # `001_initial_schema.sql` etc. reference (auth, storage, etc.)
          # and the extensions our app uses. The point of this job is to
          # validate our own SQL, not Supabase's.
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE SCHEMA IF NOT EXISTS realtime;
          CREATE SCHEMA IF NOT EXISTS vault;
          CREATE SCHEMA IF NOT EXISTS extensions;

          -- Supabase installs every extension into the `extensions`
          -- schema (see their `_supabase` setup). Migration 055 calls
          -- `extensions.digest(...)` (qualified) and migration 014 calls
          -- `gen_random_bytes(32)` (unqualified), so we both:
          --   1. Place extensions in `extensions` schema, and
          --   2. Add `extensions` to search_path for the database/role.
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS pgcrypto SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS pg_trgm SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS btree_gin SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS btree_gist SCHEMA extensions;

          -- Mirror Supabase's runtime search_path so unqualified calls to
          -- pgcrypto/uuid-ossp/etc. functions resolve. ALTER DATABASE
          -- requires a reconnect, but ALTER ROLE applies on next session;
          -- we set both for belt-and-braces and reset our own session
          -- search_path explicitly below.
          ALTER DATABASE drift_check SET search_path = "$user", public, extensions;
          ALTER ROLE postgres SET search_path = "$user", public, extensions;
          SET search_path = "$user", public, extensions;

          -- Stub the auth helper functions our policies reference. We
          -- never INVOKE them in this job (no rows are inserted), but
          -- CREATE POLICY validates the function signature at parse time.
          -- Storage stub. Migration 011 inserts a row into storage.buckets;
          -- in real Supabase this table comes from the storage extension.
          -- Signature must match (id, name, public) at minimum.
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id text PRIMARY KEY,
            name text NOT NULL,
            owner uuid,
            created_at timestamptz DEFAULT now(),
            updated_at timestamptz DEFAULT now(),
            public boolean DEFAULT false,
            avif_autodetection boolean DEFAULT false,
            file_size_limit bigint,
            allowed_mime_types text[]
          );

          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text,
            encrypted_password text,
            email_confirmed_at timestamptz,
            phone text,
            phone_confirmed_at timestamptz,
            confirmation_token text,
            recovery_token text,
            email_change_token_new text,
            email_change text,
            raw_app_meta_data jsonb,
            raw_user_meta_data jsonb,
            is_super_admin boolean,
            created_at timestamptz DEFAULT now(),
            updated_at timestamptz DEFAULT now(),
            last_sign_in_at timestamptz,
            role text
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text
            LANGUAGE sql STABLE AS $$ SELECT 'anon'::text $$;
          CREATE OR REPLACE FUNCTION auth.email() RETURNS text
            LANGUAGE sql STABLE AS $$ SELECT NULL::text $$;
          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb
            LANGUAGE sql STABLE AS $$ SELECT '{}'::jsonb $$;

          -- Roles the policies grant to. CREATE ROLE IF NOT EXISTS is
          -- not portable; fall back to a DO block.
          DO $$ BEGIN
            CREATE ROLE anon NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE authenticated NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE service_role NOLOGIN BYPASSRLS;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;

          -- Realtime publication. Migration 034 calls
          -- `ALTER PUBLICATION supabase_realtime ADD TABLE public.orders`;
          -- in real Supabase the publication is created by the realtime
          -- extension at provisioning. CREATE PUBLICATION ... WITH NO
          -- TABLES is the supported "empty" form.
          DO $$ BEGIN
            CREATE PUBLICATION supabase_realtime;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          SQL
          echo "✓ Supabase-shaped bootstrap complete"

      - name: Apply migrations sequentially
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGUSER: postgres
          PGDATABASE: drift_check
        run: |
          set -e
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ applying $f"
            # Wrap each migration in its own transaction so a single bad
            # file fails noisily without poisoning later migrations.
            psql --single-transaction -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✓ all migrations applied cleanly"

      - name: Capture clean schema
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGUSER: postgres
          PGDATABASE: drift_check
        run: |
          # Same exclude-set as the production dump in Layer 2 — the two
          # files must be derived from comparable inputs to be diffable.
          pg_dump --schema-only --no-owner --no-privileges \
            --exclude-schema=auth --exclude-schema=storage --exclude-schema=realtime \
            --exclude-schema=pgbouncer --exclude-schema=graphql --exclude-schema=graphql_public \
            --exclude-schema=extensions --exclude-schema=vault \
            --exclude-schema=net --exclude-schema=cron --exclude-schema=supabase_functions \
            --exclude-schema=_realtime --exclude-schema=_analytics --exclude-schema=pgsodium \
            --exclude-schema=pgsodium_masks --exclude-schema=supabase_migrations \
            > schema-from-migrations.sql
          wc -l schema-from-migrations.sql

      - uses: actions/upload-artifact@v7
        with:
          name: schema-from-migrations
          path: schema-from-migrations.sql
          retention-days: 30

  # ─── Layer 2: production diff (only when secret is set) ──────────────────
  drift:
    name: Compare against production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: parse
    # Only run when SUPABASE_DB_URL is configured. Inputs from secrets
    # cannot be used in `if:` directly so we use `vars.HAS_PROD_DB_URL`
    # as a public toggle that we set when the secret is provisioned.
    if: ${{ vars.HAS_PROD_DB_URL == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: schema-from-migrations
          path: ./

      - name: Install postgres client 18
        # Supabase prod is on PostgreSQL 18 as of 2026-04 (see also
        # restore-drill.yml). pg_dump major must be >= server major.
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-18
          /usr/lib/postgresql/18/bin/pg_dump --version

      - name: Dump production schema
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Exclude every Supabase-managed schema. We compare ONLY the
          # schemas this repo owns (public + supabase_migrations is
          # excluded by virtue of being an internal supabase tracking
          # table that isn't part of `001_initial_schema.sql`).
          /usr/lib/postgresql/18/bin/pg_dump \
            --schema-only --no-owner --no-privileges \
            --exclude-schema=auth --exclude-schema=storage --exclude-schema=realtime \
            --exclude-schema=pgbouncer --exclude-schema=graphql --exclude-schema=graphql_public \
            --exclude-schema=extensions --exclude-schema=vault \
            --exclude-schema=net --exclude-schema=cron --exclude-schema=supabase_functions \
            --exclude-schema=_realtime --exclude-schema=_analytics --exclude-schema=pgsodium \
            --exclude-schema=pgsodium_masks --exclude-schema=supabase_migrations \
            "$DATABASE_URL" \
            > schema-from-production.sql
          wc -l schema-from-production.sql

      - name: Diff schemas
        id: diff
        run: |
          # Normalise both files. We strip:
          #   - SET statements and SQL comments (line-level pg_dump output)
          #   - \restrict / \unrestrict markers — pg_dump 18 emits a random
          #     token per dump, never stable
          #   - Supabase platform-managed objects: extensions (pg_graphql,
          #     supabase_vault, pg_stat_statements), event triggers
          #     installed by Supabase (issue_pg_*, pgrst_*, set_graphql_*)
          #     and the supabase_realtime_messages_publication that comes
          #     with the realtime extension. These are the platform's
          #     property and we must not codify them in our migrations.
          # Then sort -u so semantically order-independent statements
          # (CREATE INDEX, ALTER PUBLICATION ADD TABLE, etc.) don't
          # produce false positives.
          NORMALIZE='grep -vE "^(SET |--|\\\\restrict|\\\\unrestrict)" \
            | grep -vE "(pg_graphql|supabase_vault|supabase_realtime_messages_publication|issue_pg_cron_access|issue_pg_graphql_access|issue_pg_net_access|issue_graphql_placeholder|pgrst_ddl_watch|pgrst_drop_watch|set_graphql_placeholder|grant_pg_cron_access|grant_pg_graphql_access|grant_pg_net_access)" \
            | grep -vE "^(COMMENT ON EXTENSION|CREATE EXTENSION IF NOT EXISTS) (pg_stat_statements)" \
            | sort -u'
          eval "$NORMALIZE" < schema-from-migrations.sql > /tmp/mig.norm
          eval "$NORMALIZE" < schema-from-production.sql > /tmp/prod.norm
          diff -u /tmp/mig.norm /tmp/prod.norm > schema-drift.diff || true
          if [ -s schema-drift.diff ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::error::Schema drift detected — see schema-drift.diff artifact."
            head -120 schema-drift.diff
            exit 1
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "✓ no drift between repo migrations and production"
          fi

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: schema-drift-diff
          path: schema-drift.diff
          retention-days: 30
