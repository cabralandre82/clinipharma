name: Restore Drill

# Monthly automated drill: fetch the latest offsite backup, decrypt, restore
# into a temporary PostgreSQL instance spun up in the workflow, and verify
# integrity against a set of sanity SQL checks. Records measured RTO.
#
# Storage buckets are NOT restored here — we only verify that the encrypted
# tarball decrypts and has a valid `tar` header (full restore is exercised in
# staging quarterly by hand).
#
# Triggers:
#   - 1st of each month at 05:00 BRT (08:00 UTC)
#   - Manual dispatch

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      backup_prefix:
        description: 'Specific backup prefix to restore (e.g. weekly/20260414T070000Z). Defaults to newest.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: restore-drill
  cancel-in-progress: false

jobs:
  drill:
    name: Restore drill
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: drill
          POSTGRES_PASSWORD: drill
          POSTGRES_DB: drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drill"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TZ: America/Sao_Paulo
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        # Supabase prod is on PostgreSQL 18 as of 2026-04 (dump format 1.16).
        # pg_restore must match or exceed the dump format major, so we pin to
        # client 18. Use the explicit /usr/lib path to bypass pg_wrapper.
        # awscli v2 and jq are pre-installed on ubuntu-latest.
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18 age
          /usr/lib/postgresql/18/bin/pg_restore --version
          aws --version
          jq --version

      - name: Locate backup prefix
        id: find
        run: |
          set -euo pipefail
          PREFIX="${{ github.event.inputs.backup_prefix }}"
          if [ -z "$PREFIX" ]; then
            PREFIX=$(aws --endpoint-url="$R2_ENDPOINT" \
              s3api list-objects-v2 \
              --bucket "${{ secrets.R2_BUCKET }}" \
              --prefix weekly/ \
              --query 'Contents[].Key' \
              --output text | tr '\t' '\n' | grep -E '\.age$' | sed 's|/[^/]*$||' | sort -u | tail -1)
          fi
          if [ -z "$PREFIX" ]; then
            echo "::error::No backups found in R2 bucket"
            exit 1
          fi
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "Using prefix: $PREFIX"

      - name: Fetch backup artefacts
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/restore"
          aws --endpoint-url="$R2_ENDPOINT" \
            s3 sync "s3://${{ secrets.R2_BUCKET }}/${{ steps.find.outputs.prefix }}/" \
            "$RUNNER_TEMP/restore/" \
            --no-progress
          ls -lh "$RUNNER_TEMP/restore/"

      - name: Decrypt with age private key
        env:
          AGE_PRIVATE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/restore"
          # Keep the identity OUTSIDE the restore dir so the *.age glob
          # below cannot accidentally try to "decrypt" the private key
          # itself (which fails with a redacted "unexpected intro: ***"
          # error that wastes everyone's time during a real incident).
          IDENTITY="$RUNNER_TEMP/identity.age"
          umask 077
          printf '%s\n' "$AGE_PRIVATE_KEY" > "$IDENTITY"
          for f in *.age; do
            plain="${f%.age}"
            age -d -i "$IDENTITY" -o "$plain" "$f"
          done
          rm -f "$IDENTITY"
          ls -lh

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/restore"
          sha256sum -c manifest-sha256.txt

      - name: Bootstrap Supabase-shaped placeholders
        env:
          PGPASSWORD: drill
        run: |
          set -euo pipefail
          PSQL=/usr/lib/postgresql/18/bin/psql
          # Pre-create the Supabase-managed roles, schemas, extensions and
          # the handful of catalogue tables that the production dump
          # references. Without these, pg_restore emits hundreds of
          # noise errors ("role X does not exist", "extension Y is not
          # available") and the drill's signal-to-noise drops to zero.
          #
          # Extensions only available inside Supabase (pg_graphql,
          # supabase_vault, pgsodium, pg_net) cannot be installed on a
          # vanilla postgres:18 image — those errors remain tolerable
          # and are filtered by the success-evaluation step below.
          $PSQL "postgresql://drill:drill@localhost:5432/drill" \
            -v ON_ERROR_STOP=1 -X <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE SCHEMA IF NOT EXISTS realtime;
          CREATE SCHEMA IF NOT EXISTS vault;
          CREATE SCHEMA IF NOT EXISTS extensions;
          CREATE SCHEMA IF NOT EXISTS graphql;
          CREATE SCHEMA IF NOT EXISTS graphql_public;
          CREATE SCHEMA IF NOT EXISTS _realtime;
          CREATE SCHEMA IF NOT EXISTS supabase_functions;

          CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS pgcrypto   SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS pg_trgm    SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS btree_gin  SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS btree_gist SCHEMA extensions;

          ALTER DATABASE drill SET search_path = "$user", public, extensions;

          DO $$ BEGIN CREATE ROLE anon NOLOGIN;                     EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated NOLOGIN;            EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE service_role NOLOGIN BYPASSRLS;   EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE supabase_admin SUPERUSER;         EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE supabase_auth_admin NOINHERIT;    EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE supabase_storage_admin NOINHERIT; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE supabase_realtime_admin NOINHERIT; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE supabase_functions_admin NOINHERIT; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE supabase_replication_admin REPLICATION; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticator NOINHERIT LOGIN PASSWORD 'placeholder'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE pgsodium_keyholder;               EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE pgsodium_keymaker;                EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE pgsodium_keyiduser;               EXCEPTION WHEN duplicate_object THEN NULL; END $$;

          -- vault.secrets is created by the supabase_vault extension on
          -- managed Supabase. Stub a compatible shape so policies in the
          -- dump can be reattached without errors.
          CREATE TABLE IF NOT EXISTS vault.secrets (
            id              uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            name            text,
            description     text DEFAULT '',
            secret          text NOT NULL,
            key_id          uuid,
            nonce           bytea,
            created_at      timestamptz NOT NULL DEFAULT now(),
            updated_at      timestamptz NOT NULL DEFAULT now()
          );

          DO $$ BEGIN CREATE PUBLICATION supabase_realtime; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          SQL
          echo "✓ placeholders ready"

      - name: Restore database
        env:
          PGPASSWORD: drill
        run: |
          set -uo pipefail
          cd "$RUNNER_TEMP/restore"
          DUMP=$(ls db-*.dump | head -1)
          # Explicit path so pg_wrapper can't drop us back onto an older
          # binary that doesn't understand the dump format.
          PG_RESTORE=/usr/lib/postgresql/18/bin/pg_restore
          START=$(date +%s)
          # We do NOT use --exit-on-error: a Supabase dump will always
          # produce a handful of tolerable errors (extensions only
          # available in managed Supabase, roles owned by the platform).
          # Capture stderr to a log so the eval step can grade what
          # actually failed vs what was expected noise.
          set +e
          "$PG_RESTORE" \
            --no-owner --no-privileges \
            --clean --if-exists \
            --dbname=postgresql://drill:drill@localhost:5432/drill \
            --jobs=4 \
            "$DUMP" \
            2> "$RUNNER_TEMP/pg_restore.stderr"
          PG_RESTORE_RC=$?
          set -e
          END=$(date +%s)
          DURATION=$((END - START))
          echo "restore_seconds=$DURATION" >> "$GITHUB_ENV"
          echo "pg_restore_rc=$PG_RESTORE_RC"  >> "$GITHUB_ENV"
          echo "Restore took ${DURATION}s (pg_restore exit ${PG_RESTORE_RC})"
          echo "--- stderr tail ---"
          tail -n 40 "$RUNNER_TEMP/pg_restore.stderr" || true

      - name: Evaluate restore outcome
        run: |
          set -euo pipefail
          ERR_LOG="$RUNNER_TEMP/pg_restore.stderr"
          [ -f "$ERR_LOG" ] || { echo "::error::pg_restore stderr missing"; exit 1; }
          TOTAL=$(grep -c '^pg_restore: error:' "$ERR_LOG" || true)
          # Tolerable: extensions only available inside Supabase, plus
          # ALTER OWNER / GRANT to platform-owned roles that we can't
          # impersonate. These cannot be exercised in a vanilla PG drill.
          # Tolerable patterns:
          #  1. Supabase-managed extensions not available in vanilla PG
          #  2. Supabase-managed role names (rare here since we pre-create them)
          #  3. Schema already exists / cannot drop schema — direct
          #     consequence of bootstrapping the same schemas the dump
          #     also tries to recreate via --clean --if-exists.
          TOLERABLE=$(grep -E '^pg_restore: error:' "$ERR_LOG" | grep -cE \
            'extension "(pg_graphql|supabase_vault|pgsodium|pg_net|pgaudit|pg_cron|pg_jsonschema|wrappers|hypopg|index_advisor|pgmq|http|plpgsql_check|plv8)"|role "(supabase_admin|supabase_auth_admin|supabase_storage_admin|supabase_realtime_admin|supabase_functions_admin|supabase_replication_admin|pgsodium_|authenticator)"|schema "(vault|extensions|auth|storage|realtime|graphql|graphql_public|_realtime|supabase_functions)" already exists|cannot drop schema (vault|extensions|auth|storage|realtime|graphql|graphql_public|_realtime|supabase_functions)' \
            || true)
          REAL=$((TOTAL - TOLERABLE))
          echo "pg_restore errors: total=$TOTAL tolerable=$TOLERABLE real=$REAL"
          {
            echo "## pg_restore error summary"
            echo "- total: $TOTAL"
            echo "- tolerable (Supabase-managed extensions/roles): $TOLERABLE"
            echo "- **real:** $REAL"
          } >> "$GITHUB_STEP_SUMMARY"
          # Threshold: allow up to 25 unaccounted errors before failing.
          # A real corruption or schema drift produces hundreds.
          if [ "$REAL" -gt 25 ]; then
            echo "::error::$REAL unexpected pg_restore errors — see stderr log artefact"
            exit 1
          fi

      - name: Storage archive structural check
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/restore"
          STG=$(ls storage-*.tgz | head -1)
          tar -tzf "$STG" >/dev/null
          echo "Storage archive header OK"

      - name: Integrity queries
        env:
          PGPASSWORD: drill
        run: |
          set -euo pipefail
          PSQL="/usr/lib/postgresql/18/bin/psql postgresql://drill:drill@localhost:5432/drill -X -A -t -c"
          # Each query is wrapped: missing tables are flagged but don't
          # short-circuit the rest of the integrity sweep. The drill
          # cares about which tables came back, not about a single
          # missing optional one.
          probe() {
            local label="$1"; local sql="$2"
            local out
            if out=$($PSQL "$sql" 2>&1); then
              echo "  ✓ $label: $out"
            else
              echo "  ✗ $label: $(echo "$out" | head -1)"
            fi
          }
          echo "Tables present:"
          probe "public tables count"  "SELECT count(*) FROM pg_tables WHERE schemaname='public';"
          probe "auth tables count"    "SELECT count(*) FROM pg_tables WHERE schemaname='auth';"
          echo "Row counts:"
          probe "auth.users"            "SELECT count(*) FROM auth.users;"
          probe "public.orders"         "SELECT count(*) FROM public.orders;"
          probe "public.payments"       "SELECT count(*) FROM public.payments;"
          probe "public.audit_logs"     "SELECT count(*) FROM public.audit_logs;"
          probe "public.audit_logs max" "SELECT max(created_at) FROM public.audit_logs;"
          probe "public.audit_chain_checkpoints" "SELECT count(*) FROM public.audit_chain_checkpoints;"
          probe "public.feature_flags"  "SELECT count(*) FROM public.feature_flags;"
          probe "public.products"       "SELECT count(*) FROM public.products;"
          probe "public.pharmacies"     "SELECT count(*) FROM public.pharmacies;"
          probe "public.clinics"        "SELECT count(*) FROM public.clinics;"
          probe "public.prescriptions"  "SELECT count(*) FROM public.prescriptions;"

      - name: Upload pg_restore stderr (for forensics)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pg_restore-stderr
          path: ${{ runner.temp }}/pg_restore.stderr
          retention-days: 30
          if-no-files-found: ignore

      - name: Record outcome to platform ledger
        if: always()
        env:
          LEDGER_URL: ${{ secrets.BACKUP_LEDGER_URL }}
          LEDGER_SECRET: ${{ secrets.BACKUP_LEDGER_SECRET }}
        run: |
          if [ -z "${LEDGER_URL:-}" ] || [ -z "${LEDGER_SECRET:-}" ]; then
            echo "::warning::BACKUP_LEDGER_URL/SECRET unset — skipping ledger record"
            exit 0
          fi
          OUTCOME=ok
          [ "${{ job.status }}" = "success" ] || OUTCOME=fail
          BODY=$(jq -cn \
            --arg kind "RESTORE_DRILL" \
            --arg label "monthly" \
            --arg prefix "${{ steps.find.outputs.prefix }}" \
            --arg outcome "$OUTCOME" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson dur "${restore_seconds:-0}" \
            --arg commit "${{ github.sha }}" \
            '{kind: $kind, label: $label, r2_prefix: $prefix, outcome: $outcome, source_url: $url, metadata: {restore_seconds: $dur, commit: $commit}}')
          for DELAY in 2 5 15 0; do
            HTTP=$(curl -sS -o /tmp/ledger.json -w '%{http_code}' \
              -X POST "$LEDGER_URL" \
              -H "Authorization: Bearer $LEDGER_SECRET" \
              -H 'Content-Type: application/json' \
              -d "$BODY") || HTTP=000
            if [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ]; then
              echo "Ledger recorded: $(cat /tmp/ledger.json)"
              exit 0
            fi
            echo "::warning::ledger POST returned $HTTP, retrying in ${DELAY}s"
            [ "$DELAY" = "0" ] || sleep "$DELAY"
          done
          echo "::error::failed to record restore-drill into platform ledger"
          cat /tmp/ledger.json || true
          exit 0

      - name: Write drill result to summary
        if: always()
        run: |
          {
            echo "# Restore drill — $(date -Iseconds)"
            echo ""
            echo "**Source prefix:** ${{ steps.find.outputs.prefix }}"
            echo ""
            echo "**Restore duration:** ${restore_seconds:-?} s"
            echo ""
            echo "**Status:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

